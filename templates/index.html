<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimation immobiliere</title>
    <style>
        :root {
            --bg: #f6f8fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #d9e2ec;
            --primary: #315c9f;
            --primary-dark: #294f8a;
            --success-bg: #f2f7ff;
            --success-border: #d8e6fb;
            --soft: #f8fbff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(49, 92, 159, 0.08), transparent 22%),
                radial-gradient(circle at 85% 15%, rgba(15, 23, 42, 0.05), transparent 18%),
                linear-gradient(180deg, #f8fafc 0%, #f1f5f9 52%, #eef3f8 100%);
            color: var(--text);
            padding: 32px 16px;
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background:
                linear-gradient(rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.35)),
                repeating-linear-gradient(
                    90deg,
                    transparent 0,
                    transparent 79px,
                    rgba(148, 163, 184, 0.05) 80px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent 0,
                    transparent 79px,
                    rgba(148, 163, 184, 0.05) 80px
                );
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.22), transparent 75%);
        }

        body::after {
            background:
                radial-gradient(circle at 12% 78%, rgba(49, 92, 159, 0.07), transparent 16%),
                radial-gradient(circle at 88% 88%, rgba(37, 99, 235, 0.06), transparent 18%);
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 32px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.9rem;
            font-weight: 600;
        }

        .intro {
            margin: 0 0 28px;
            color: var(--muted);
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 0.95rem;
            font-weight: 500;
        }

        input,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.98rem;
            background: var(--soft);
            color: var(--text);
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(49, 92, 159, 0.12);
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }

        .primary {
            background: var(--primary);
            color: #fff;
        }

        .primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .secondary {
            background: #f3f6fa;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .reset-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 0.9rem;
            color: var(--primary);
            background: #f7faff;
            border: 1px solid #d8e4f4;
            transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
        }

        .secondary:hover {
            background: #ebf0f6;
        }

        .reset-link:hover {
            background: #eef4fc;
            border-color: #c9d9ef;
            color: var(--primary-dark);
            transform: translateY(-1px);
        }

        .status {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .result {
            margin-top: 24px;
            padding: 16px 18px;
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            border-radius: 12px;
        }

        .result strong {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--primary-dark);
        }

        .result p {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .result .result-meta {
            margin-top: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--muted);
        }

        .card-footer {
            margin-top: 18px;
            display: flex;
            justify-content: flex-end;
        }

        @media (max-width: 640px) {
            .card {
                padding: 22px;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Estimation immobiliere</h1>
            <p class="intro">
                Remplis les informations principales du bien pour obtenir une estimation du prix.
            </p>

            <form id="prediction-form">
                <div class="grid">
                    <div class="field">
                        <label for="qualite_generale">Qualite generale /10</label>
                        <input id="qualite_generale" type="number" name="qualite_generale" min="1" max="10" placeholder="Ex: 6" required>
                    </div>

                    <div class="field">
                        <label for="annee_construction">Annee de construction</label>
                        <input id="annee_construction" type="number" name="annee_construction" min="1900" max="2030" placeholder="Ex: 2005" required>
                    </div>

                    <div class="field">
                        <label for="surface_habitable">Surface habitable (m2)</label>
                        <input id="surface_habitable" type="number" step="any" name="surface_habitable" min="1" placeholder="Ex: 1400 m2" required>
                    </div>

                    <div class="field">
                        <label for="surface_totale_sous_sol">Surface totale sous-sol (m2)</label>
                        <input id="surface_totale_sous_sol" type="number" step="any" name="surface_totale_sous_sol" min="0" placeholder="Ex: 900 m2" required>
                    </div>

                    <div class="field">
                        <label for="surface_garage">Surface garage (m2)</label>
                        <input id="surface_garage" type="number" step="any" name="surface_garage" min="0" placeholder="Ex: 350 m2" required>
                    </div>

                    <div class="field">
                        <label for="surface_terrain">Surface terrain (m2)</label>
                        <input id="surface_terrain" type="number" step="any" name="surface_terrain" min="1" placeholder="Ex: 7000 m2" required>
                    </div>

                    <div class="field">
                        <label for="total_salles_bain">Total salles de bain</label>
                        <input id="total_salles_bain" type="number" step="any" name="total_salles_bain" min="0" placeholder="Ex: 2.5" required>
                    </div>

                    <div class="field">
                        <label for="climatisation_centrale">Climatisation centrale</label>
                        <select id="climatisation_centrale" name="climatisation_centrale" required>
                            <option value="" selected>Selectionner</option>
                            <option value="y">Oui</option>
                            <option value="n">Non</option>
                        </select>
                    </div>
                </div>

                <div class="actions">
                    <button class="primary" id="submit-button" type="submit">Estimer</button>
                    <button class="secondary" id="fill-demo" type="button">Exemple</button>
                    <span class="status" id="status-text">Saisis les valeurs puis lance le calcul.</span>
                </div>
            </form>

            <div class="result" id="result-box" hidden>
                <strong>Resultat</strong>
                <p id="result-text"></p>
                <p class="result-meta" id="result-interval" hidden></p>
            </div>

            <div class="card-footer">
                <button class="reset-link" id="reset-button" type="button">Recommencer l'estimation</button>
            </div>
        </div>
    </div>

    <script>
        window.APP_CONFIG = window.APP_CONFIG || {};
    </script>
    <script src="./app-config.js"></script>
    <script>
        function resolveApiBaseUrl() {
            const explicitConfig = window.APP_CONFIG && window.APP_CONFIG.apiBaseUrl;
            const savedApiBaseUrl = window.localStorage.getItem("api_base_url");
            const isLocalHost = ["localhost", "127.0.0.1"].includes(window.location.hostname);

            if (explicitConfig) {
                return explicitConfig.replace(/\/$/, "");
            }

            if (savedApiBaseUrl) {
                return savedApiBaseUrl.replace(/\/$/, "");
            }

            if (isLocalHost) {
                return "http://127.0.0.1:5000";
            }

            return window.location.origin;
        }

        const API_BASE_URL = resolveApiBaseUrl();
        const API_URL = `${API_BASE_URL}/predict`;
        const form = document.getElementById("prediction-form");
        const submitButton = document.getElementById("submit-button");
        const fillDemoButton = document.getElementById("fill-demo");
        const resetButton = document.getElementById("reset-button");
        const statusText = document.getElementById("status-text");
        const resultBox = document.getElementById("result-box");
        const resultText = document.getElementById("result-text");
        const resultInterval = document.getElementById("result-interval");

        async function readApiResponse(response) {
            const contentType = response.headers.get("content-type") || "";
            const rawText = await response.text();

            if (!contentType.includes("application/json")) {
                throw new Error(
                    `L'API ${API_URL} n'a pas renvoye du JSON. Verifie app-config.js ou l'URL d'API.`
                );
            }

            try {
                return JSON.parse(rawText);
            } catch (error) {
                throw new Error(
                    `Reponse JSON invalide depuis ${API_URL}.`
                );
            }
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function randomFloat(min, max, step = 0.5) {
            const steps = Math.round((max - min) / step);
            return (min + randomInt(0, steps) * step).toFixed(step % 1 === 0 ? 0 : 1);
        }

        function buildDemoValues() {
            const qualite = randomInt(4, 8);
            const surfaceHabitable = randomInt(900, 2600);
            const surfaceSousSol = randomInt(0, Math.round(surfaceHabitable * 0.8));
            const surfaceGarage = randomInt(0, 550);
            const surfaceTerrain = randomInt(3500, 12000);
            const anneeConstruction = randomInt(1965, 2020);
            const totalSallesBain = randomFloat(1, 3.5, 0.5);
            const climatisation = Math.random() > 0.35 ? "y" : "n";

            return {
                qualite_generale: qualite,
                surface_habitable: surfaceHabitable,
                surface_totale_sous_sol: surfaceSousSol,
                surface_garage: surfaceGarage,
                surface_terrain: surfaceTerrain,
                annee_construction: anneeConstruction,
                total_salles_bain: totalSallesBain,
                climatisation_centrale: climatisation
            };
        }

        fillDemoButton.addEventListener("click", () => {
            const demoValues = buildDemoValues();
            Object.entries(demoValues).forEach(([name, value]) => {
                const field = form.elements.namedItem(name);
                if (field) {
                    field.value = value;
                }
            });
            resultBox.hidden = true;
            resultInterval.hidden = true;
            resultInterval.textContent = "";
            statusText.textContent = "Exemple aleatoire charge.";
        });

        resetButton.addEventListener("click", () => {
            form.reset();
            resultBox.hidden = true;
            resultInterval.hidden = true;
            resultInterval.textContent = "";
            statusText.textContent = "Formulaire reinitialise.";
        });

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            submitButton.disabled = true;
            submitButton.textContent = "Calcul...";
            statusText.textContent = "Estimation en cours.";
            resultBox.hidden = true;
            resultInterval.hidden = true;
            resultInterval.textContent = "";

            const payload = Object.fromEntries(new FormData(form).entries());

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await readApiResponse(response);

                if (!response.ok || !data.ok) {
                    throw new Error(data.error || "Erreur lors de l'estimation.");
                }

                resultText.textContent = data.prediction_text;
                if (data.confidence_interval_text) {
                    resultInterval.textContent = data.confidence_interval_text;
                    resultInterval.hidden = false;
                } else {
                    resultInterval.hidden = true;
                }
                resultBox.hidden = false;
                statusText.textContent = "Estimation terminee.";
            } catch (error) {
                resultText.textContent = error.message;
                resultInterval.hidden = true;
                resultBox.hidden = false;
                statusText.textContent = "Impossible de calculer l'estimation.";
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = "Estimer";
            }
        });
    </script>
</body>
</html>
